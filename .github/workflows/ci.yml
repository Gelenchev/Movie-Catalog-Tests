name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Movie_Catalog/Movie_Catalog.csproj

      - name: Build the solution
        run: dotnet build Movie_Catalog/Movie_Catalog.csproj --no-restore

      - name: Run all tests
        run: dotnet test Movie_Catalog/Movie_Catalog.csproj --no-build
